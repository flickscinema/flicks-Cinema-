<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLICKS CINEMA</title>
    <style>
        :root {
            --bg-color: #0f171e;
            --text-color: #ffffff;
            --accent-color: #00a8e1;
            --sidebar-width: 80px;
            --card-bg: #1a2026;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            overflow-x: hidden;
        }

        /* --- SEARCH OVERLAY --- */
        #search-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 30, 0.98); backdrop-filter: blur(10px);
            z-index: 2000; display: none; flex-direction: column; align-items: center; padding-top: 100px;
        }
        .search-container { width: 80%; max-width: 800px; position: relative; }
        .search-input { width: 100%; background: transparent; border: none; border-bottom: 2px solid var(--accent-color); color: white; font-size: 2.5rem; padding: 10px; outline: none; }
        .close-search { position: absolute; right: 40px; top: 40px; font-size: 3rem; cursor: pointer; color: white; opacity: 0.7; }
        .search-results { margin-top: 50px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; width: 80%; max-width: 1200px; }

        /* --- NAVIGATION SIDEBAR --- */
        .sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-width);
            background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px);
            display: flex; flex-direction: column; align-items: center; padding-top: 30px;
            z-index: 1000; border-right: 1px solid rgba(255, 255, 255, 0.05);
        }
        .profile-icon { width: 35px; height: 35px; background: linear-gradient(45deg, #00c6ff, #0072ff); border-radius: 50%; margin-bottom: 50px; }
        .nav-group { display: flex; flex-direction: column; gap: 35px; }
        .nav-icon { width: 26px; height: 26px; opacity: 0.5; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; position: relative; }
        .nav-icon svg { fill: white; width: 100%; height: 100%; }
        .nav-icon:hover, .nav-icon.active { opacity: 1; transform: scale(1.1); }
        .nav-icon.active::before { content: ''; position: absolute; left: -27px; width: 4px; height: 26px; background-color: white; border-radius: 0 4px 4px 0; }

        /* --- MAIN VIEW --- */
        .main-view { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); min-height: 100vh; }
        
        /* --- HOME HERO --- */
        #home-view { display: block; }
        .hero { position: relative; height: 85vh; display: flex; align-items: center; overflow: hidden; }
        .video-background iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: -1; }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to right, rgba(15,23,30,1) 15%, rgba(15,23,30,0.6) 40%, transparent 100%), linear-gradient(to top, rgba(15,23,30,1) 0%, transparent 20%); }
        .hero-content { position: relative; z-index: 2; padding-left: 60px; max-width: 650px; }
        .movie-title { font-size: 4rem; font-weight: 900; line-height: 0.95; letter-spacing: -2px; margin: 0; text-transform: uppercase; }
        .btn-more { background: #f3f3f3; color: #000; padding: 14px 35px; border: none; border-radius: 4px; font-weight: 800; cursor: pointer; margin-top: 25px; transition: 0.2s; }

        /* --- GRIDS --- */
        .content-section { padding: 40px 60px; }
        .section-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 25px; color: #e5e5e5; }
        .movie-grid { display: flex; flex-wrap: wrap; gap: 20px; }
        .movie-card { width: 220px; cursor: pointer; transition: 0.3s; }
        .movie-card:hover { transform: scale(1.05); }
        .movie-card img { width: 100%; height: 330px; object-fit: cover; border-radius: 10px; }
        .card-title { margin-top: 12px; font-size: 0.95rem; font-weight: 600; color: #ffffff; }

        /* --- DETAIL PAGE --- */
        .detail-page { display: none; padding: 40px 80px; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .details-header { display: flex; gap: 60px; margin-bottom: 40px; align-items: flex-start; }
        .poster-large { min-width: 320px; height: 480px; border-radius: 12px; background-size: cover; background-position: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .tag { background: #2d3748; padding: 6px 14px; border-radius: 4px; font-size: 0.85rem; margin-right: 10px; font-weight: 600; }
        .cast-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 25px; }
        .cast-card { background: var(--card-bg); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .cast-name { font-weight: bold; display: block; color: #fff; }
        .cast-role { font-size: 0.85rem; color: #9ca3af; }
        .back-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 10px 20px; cursor: pointer; border-radius: 4px; margin-bottom: 30px; }
        .meta-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .info-label { color: #9ca3af; font-size: 0.75rem; text-transform: uppercase; font-weight: bold; }
        .info-value { font-size: 1rem; color: #fff; }

        /* --- CONTACT --- */
        .contact-card { background: var(--card-bg); padding: 40px; border-radius: 12px; max-width: 600px; display: flex; flex-direction: column; gap: 30px; }
        .contact-item { display: flex; flex-direction: column; gap: 8px; }
        .contact-label { color: #9ca3af; font-size: 0.8rem; text-transform: uppercase; font-weight: 600; }
        .contact-value { color: #fff; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="search-overlay">
        <span class="close-search" onclick="toggleSearch()">×</span>
        <div class="search-container">
            <input type="text" class="search-input" id="movie-search" placeholder="Search movies..." onkeyup="filterMovies()">
        </div>
        <div class="search-results" id="search-results-box"></div>
    </div>

    <div class="sidebar">
        <div class="profile-icon"></div>
        <div class="nav-group">
            <div class="nav-icon" onclick="toggleSearch()"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></div>
            <div class="nav-icon active" id="nav-home" onclick="showView('home-view', this)"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
            <div class="nav-icon" id="nav-contact" onclick="showView('contact-view', this)"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></div>
        </div>
    </div>

    <div class="main-view">
        <div id="home-view">
            <section class="hero">
                <div class="video-background"><iframe src="https://www.youtube.com/embed/8TZMtslA3UY?autoplay=1&mute=1&controls=0&loop=1&playlist=8TZMtslA3UY" frameborder="0"></iframe></div>
                <div class="hero-overlay"></div>
                <div class="hero-content">
                    <h1 class="movie-title">SPIDER-MAN<br>BRAND NEW DAY</h1>
                    <button class="btn-more" onclick="showView('spider-details')">More details</button>
                </div>
            </section>
            <section class="content-section">
                <div class="section-title">Coming Soon</div>
                <div class="movie-grid" id="home-grid"></div>
            </section>
        </div>

        <div id="details-container"></div>

        <div id="contact-view" class="detail-page">
            <h1 style="font-size: 3.5rem;">Inquiry</h1>
            <div class="contact-card">
                <div class="contact-item"><span class="contact-label">Email</span><span class="contact-value">cinemaworldofficial123@gmail.com</span></div>
                <div class="contact-item"><span class="contact-label">WhatsApp</span><span class="contact-value">+94 75 727 8880</span></div>
            </div>
        </div>
    </div>

    <script>
        const movies = [
            {
                id: 'minions-details',
                title: 'Minions & Monsters (3D)',
                img: 'https://firebasestorage.googleapis.com/v0/b/kandy-city-centre.appspot.com/o/public%2Fmovies%2Fposter%2Fcc97c8ce-4c71-4ac3-a486-498766d91f70.jpg?alt=media&token=2d354090-5842-476f-86ab-ce0135a4ce83',
                release: 'July 1, 2026',
                director: 'Pierre Coffin',
                tags: ['Animation', 'Comedy', 'Adventure'],
                desc: 'Set 40 years before Minions (2015), the tribe heads to Old Hollywood to make their own monster movie, but they accidentally summon real creatures from an ancient spellbook.',
                cast: [
                    {name: 'Pierre Coffin', role: 'The Minions'},
                    {name: 'Christoph Waltz', role: 'Max (Director)'},
                    {name: 'Jeff Bridges', role: 'Studio Executive'},
                    {name: 'Allison Janney', role: 'The Tour Guide'},
                    {name: 'Trey Parker', role: 'Goomi'},
                    {name: 'Jesse Eisenberg', role: 'Dort'},
                    {name: 'Zoey Deutch', role: 'Debbie'},
                    {name: 'Bobby Moynihan', role: 'Phillip'},
                    {name: 'Phil LaMarr', role: 'Howard'}
                ]
            },
            {
                id: 'odyssey-details',
                title: 'The Odyssey',
                img: 'https://firebasestorage.googleapis.com/v0/b/kandy-city-centre.appspot.com/o/public%2Fmovies%2Fposter%2Fbc760c73-6ad6-4d01-93c7-e809df8bc4b7.jpg?alt=media&token=1a8c4c72-8de5-4e58-80ea-2165b49b51bb',
                release: 'July 17, 2026',
                director: 'Christopher Nolan',
                tags: ['Epic', 'Fantasy', 'Historical'],
                desc: 'Odysseus struggles to return home to Ithaca after the Trojan War. Shot entirely on IMAX 70mm, this epic chronicles his battle against the gods and the suitors of his wife, Penelope.',
                cast: [
                    {name: 'Matt Damon', role: 'Odysseus'},
                    {name: 'Anne Hathaway', role: 'Penelope'},
                    {name: 'Tom Holland', role: 'Telemachus'},
                    {name: 'Zendaya', role: 'Athena'},
                    {name: 'Robert Pattinson', role: 'Antinous'},
                    {name: 'Charlize Theron', role: 'Calypso'},
                    {name: 'Jon Bernthal', role: 'Menelaus'},
                    {name: 'Benny Safdie', role: 'Agamemnon'},
                    {name: 'John Leguizamo', role: 'Eumaeus'},
                    {name: 'Lupita Nyong\'o', role: 'Supporting Lead'}
                ]
            },
            {
                id: 'spider-details',
                title: 'Spider-Man: Brand New Day',
                img: 'https://i.ytimg.com/vi/8TZMtslA3UY/maxresdefault.jpg',
                release: 'July 31, 2026',
                director: 'Destin Daniel Cretton',
                tags: ['Superhero', 'Action', 'Adventure'],
                desc: 'Forgotten by the world, Peter Parker focuses on street-level crime in NYC. He must deal with a mutating superpower and an uneasy alliance with Frank Castle (The Punisher).',
                cast: [
                    {name: 'Tom Holland', role: 'Peter Parker / Spider-Man'},
                    {name: 'Zendaya', role: 'MJ Jones-Watson'},
                    {name: 'Jacob Batalon', role: 'Ned Leeds'},
                    {name: 'Jon Bernthal', role: 'Frank Castle / Punisher'},
                    {name: 'Mark Ruffalo', role: 'Bruce Banner / Hulk'},
                    {name: 'Michael Mando', role: 'Mac Gargan / Scorpion'},
                    {name: 'Sadie Sink', role: 'Supporting Lead'},
                    {name: 'Liza Colón-Zayas', role: 'Undisclosed'},
                    {name: 'Tramell Tillman', role: 'Bill'}
                ]
            },
            {
                id: 'mando-details',
                title: 'The Mandalorian and Grogu',
                img: 'https://firebasestorage.googleapis.com/v0/b/kandy-city-centre.appspot.com/o/public%2Fmovies%2Fposter%2F5b60edb3-8630-4176-97dc-6e1e858a8402.jpg?alt=media&token=0baf361b-7159-4a78-810d-9a62cf7fa31f',
                release: 'May 22, 2026',
                director: 'Jon Favreau',
                tags: ['Sci-Fi', 'Space Opera'],
                desc: 'Din Djarin and Grogu work for the New Republic to track Imperial remnants. Their mission involves Rotta the Hutt and a secret Imperial plot that threatens the galaxy.',
                cast: [
                    {name: 'Pedro Pascal', role: 'Din Djarin'},
                    {name: 'Sigourney Weaver', role: 'Colonel Ward'},
                    {name: 'Jeremy Allen White', role: 'Rotta the Hutt (Voice)'},
                    {name: 'Steve Blum', role: 'Zeb Orrelios (Voice)'},
                    {name: 'Brendan Wayne', role: 'Mandalorian Double'},
                    {name: 'Lateef Crowder', role: 'Mandalorian Stunts'},
                    {name: 'Jonny Coyne', role: 'Janu (Imperial)'},
                    {name: 'Dave Filoni', role: 'Trapper Wolf'}
                ]
            }
        ];

        function init() {
            const grid = document.getElementById('home-grid');
            const detailContainer = document.getElementById('details-container');
            movies.forEach(m => {
                grid.innerHTML += `<div class="movie-card" onclick="showView('${m.id}')"><img src="${m.img}"><div class="card-title">${m.title}</div></div>`;
                detailContainer.innerHTML += `
                    <div id="${m.id}" class="detail-page">
                        <button class="back-btn" onclick="showView('home-view', document.getElementById('nav-home'))">← Back</button>
                        <div class="details-header">
                            <div class="poster-large" style="background-image: url('${m.img}')"></div>
                            <div class="details-text">
                                <h1 style="font-size: 3.5rem; margin: 10px 0;">${m.title}</h1>
                                <div style="margin-bottom: 20px;">${m.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                                <p style="color: #bdc3c7; line-height: 1.7; font-size: 1.1rem; max-width: 800px;">${m.desc}</p>
                                <div class="meta-info-grid">
                                    <div><div class="info-label">Release Date</div><div class="info-value">${m.release}</div></div>
                                    <div><div class="info-label">Director</div><div class="info-value">${m.director}</div></div>
                                </div>
                            </div>
                        </div>
                        <h2 class="section-title">Actors & Actresses</h2>
                        <div class="cast-grid">${m.cast.map(c => `<div class="cast-card"><span class="cast-name">${c.name}</span><span class="cast-role">${c.role}</span></div>`).join('')}</div>
                    </div>`;
            });
        }

        function showView(viewId, navElement) {
            document.querySelectorAll('.detail-page, #home-view').forEach(v => v.style.display = 'none');
            document.getElementById('search-overlay').style.display = 'none';
            document.getElementById(viewId).style.display = 'block';
            window.scrollTo(0, 0);
            if(navElement) {
                document.querySelectorAll('.nav-icon').forEach(icon => icon.classList.remove('active'));
                navElement.classList.add('active');
            }
        }

        function toggleSearch() {
            const overlay = document.getElementById('search-overlay');
            overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
        }

        function filterMovies() {
            const query = document.getElementById('movie-search').value.toLowerCase();
            const resultsBox = document.getElementById('search-results-box');
            resultsBox.innerHTML = '';
            movies.filter(m => m.title.toLowerCase().includes(query)).forEach(movie => {
                resultsBox.innerHTML += `<div class="movie-card" onclick="showView('${movie.id}', document.getElementById('nav-home'))"><img src="${movie.img}"><div class="card-title">${movie.title}</div></div>`;
            });
        }
        init();
    </script>
</body>
</html>
