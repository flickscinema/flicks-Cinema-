<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLICKS CINEMA</title>
    <style>
        :root {
            --primary-red: #E50914;
            --bg-black: #141414;
            --text-white: #ffffff;
            --gray: #808080;
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-black);
            color: var(--text-white);
            overflow: hidden;
        }

        .main-view {
            display: flex;
            height: 100vh;
        }

        /* Sidebar Navigation - Text Only */
        .sidebar {
            width: 100px;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            gap: 40px;
            border-right: 1px solid #222;
            z-index: 10;
        }

        .nav-item {
            color: var(--gray);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.3s;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--text-white);
        }

        .nav-item.active {
            font-weight: bold;
            border-bottom: 2px solid var(--primary-red);
            padding-bottom: 5px;
        }

        /* Hero Content */
        .hero {
            flex-grow: 1;
            background: linear-gradient(to right, #141414 5%, transparent 70%), 
                        url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            padding: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand-name {
            color: var(--primary-red);
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .hero-title {
            font-size: 6rem;
            margin: 0;
            line-height: 1;
            text-transform: uppercase;
            font-weight: 900;
        }

        .meta {
            margin: 20px 0;
            font-size: 1.2rem;
            display: flex;
            gap: 15px;
        }

        .match { color: #46d369; font-weight: bold; }

        .watch-label {
            font-size: 1.8rem;
            margin: 10px 0;
            font-weight: 500;
        }

        .description {
            max-width: 550px;
            line-height: 1.6;
            font-size: 1.2rem;
            color: #cccccc;
        }

        .brand-footer {
            margin-top: 40px;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="main-view">
        <nav class="sidebar">
            <div class="brand-footer" style="margin-top: 0; margin-bottom: 20px; color: var(--primary-red);">FC</div>
            <a class="nav-item">Search</a>
            <a class="nav-item active">Home</a>
        </nav>

        <main class="hero">
            <div class="brand-name">FLICKS CINEMA SERIES</div>
            <h1 class="hero-title">MONEY<br>HEIST</h1>
            
            <div class="meta">
                <span class="match">97% Match</span> 
                <span>2020</span> 
                <span>4 Parts</span>
            </div>

            <div class="watch-label">Watch Part 4 Now</div>
            
            <p class="description">
                Lives are on the line as the Professor's plan begins to unravel and the crew must fend off enemies from both inside and outside the Bank of Spain.
            </p>

            <div class="brand-footer">FLICKS CINEMA</div>
        </main>
    </div>

</body>
</html>
