<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Video Clone</title>
    <style>
        /* Base Styles */
        body {
            margin: 0;
            padding: 0;
            background-color: #0f171e; /* Prime dark blue */
            color: white;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Left Sidebar Navigation */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 60px;
            background-color: #0f171e;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 100px;
            z-index: 100;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-icon {
            margin-bottom: 30px;
            opacity: 0.6;
            cursor: pointer;
            font-size: 20px;
        }

        .sidebar-icon:hover { opacity: 1; }

        /* Top Navigation */
        .navbar {
            position: fixed;
            top: 0;
            left: 60px;
            right: 0;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 90;
        }

        .nav-links span {
            margin-right: 25px;
            font-weight: 600;
            color: #aaa;
            cursor: pointer;
        }

        .nav-links span.active {
            color: white;
            background: white;
            color: black;
            padding: 5px 15px;
            border-radius: 5px;
        }

        /* Hero Section */
        .hero {
            height: 85vh;
            margin-left: 60px;
            background: linear-gradient(to right, #0f171e 15%, transparent 60%), 
                        linear-gradient(to top, #0f171e 5%, transparent 30%),
                        url('https://images8.alphacoders.com/126/1266851.jpg'); /* Replace with actual Rings of Power image */
            background-size: cover;
            background-position: center top;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 60px;
        }

        .hero-title {
            width: 450px;
            margin-bottom: 10px;
        }

        .new-season {
            color: #46d369;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .play-button {
            background-color: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: fit-content;
            backdrop-filter: blur(10px);
            transition: background 0.3s;
        }

        .play-button:hover { background-color: white; color: black; }

        /* Content Rows */
        .main-content {
            margin-left: 60px;
            padding: 20px 0 50px 60px;
            margin-top: -100px; /* Pulls content up over the hero fade */
        }

        .row-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .movie-scroll {
            display: flex;
            gap: 15px;
            overflow-x: hidden;
            padding-bottom: 40px;
        }

        .card {
            min-width: 280px;
            height: 157px;
            background-color: #1a242f;
            border-radius: 8px;
            transition: transform 0.3s, outline 0.3s;
            cursor: pointer;
            background-size: cover;
            position: relative;
        }

        .card:hover {
            transform: scale(1.08);
            outline: 3px solid white;
            z-index: 10;
        }

        .prime-logo-small {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 40px;
        }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-icon">🔍</div>
        <div class="sidebar-icon">🏠</div>
        <div class="sidebar-icon">📺</div>
        <div class="sidebar-icon">📑</div>
    </div>

    <nav class="navbar">
        <div class="nav-links">
            <span class="active">Home</span>
            <span>Movies</span>
            <span>TV Shows</span>
            <span>Sports</span>
            <span>Live TV</span>
            <span style="border-left: 1px solid #444; padding-left: 20px; margin-left: 0;">Prime</span>
        </div>
        <div class="nav-right">
            <span>Subscriptions</span>
        </div>
    </nav>

    <section class="hero">
        <div class="new-season">New Season</div>
        <h1 style="font-size: 3.5rem; margin: 0; letter-spacing: 2px;">THE RINGS OF POWER</h1>
        <p style="max-width: 500px; color: #ccc;">Sauron has returned. Cast out by Galadriel, the Dark Lord must now rely on his own cunning to rebuild his strength.</p>
        <button class="play-button">▶ Play S2 E1</button>
    </section>

    <main class="main-content">
        
        <div class="row">
            <div class="row-title">Prime movies</div>
            <div class="movie-scroll">
                <div class="card" style="background-image: url('https://placehold.co/280x157/111/white?text=The+Idea+of+You')"></div>
                <div class="card" style="background-image: url('https://placehold.co/280x157/111/white?text=Road+House')"></div>
                <div class="card" style="background-image: url('https://placehold.co/280x157/111/white?text=My+Fault')"></div>
                <div class="card" style="background-image: url('https://placehold.co/280x157/111/white?text=Jackpot')"></div>
            </div>
        </div>

        <div class="row">
            <div class="row-title">Prime Originals</div>
            <div class="movie-scroll">
                <div class="card" style="background-image: url('https://placehold.co/280x157/222/white?text=Betty+La+Fea')"></div>
                <div class="card" style="background-image: url('https://placehold.co/280x157/222/white?text=Maxton+Hall')"></div>
                <div class="card" style="background-image: url('https://placehold.co/280x157/222/white?text=The+Boys')"></div>
                <div class="card" style="background-image: url('https://placehold.co/280x157/222/white?text=Fallout')"></div>
            </div>
        </div>

    </main>

</body>
</html>
