<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Video Horizontal</title>
    <style>
        body {
            margin: 0;
            background-color: #0f171e;
            color: white;
            font-family: "Segoe UI", Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Fixed Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 70px;
            background-color: #0f171e;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 80px;
            z-index: 100;
        }

        .sidebar-item {
            margin-bottom: 35px;
            font-size: 22px;
            cursor: pointer;
            opacity: 0.7;
        }

        /* Top Navigation */
        .navbar {
            position: fixed;
            top: 0;
            left: 70px;
            right: 0;
            padding: 25px 40px;
            display: flex;
            gap: 25px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 99;
            align-items: center;
        }

        .nav-item {
            font-weight: bold;
            cursor: pointer;
            color: #ccc;
        }

        .nav-item.active {
            color: white;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
        }

        /* Hero Image Section */
        .hero {
            height: 80vh;
            margin-left: 70px;
            background: linear-gradient(to right, #0f171e 10%, transparent 70%),
                        url('https://images8.alphacoders.com/126/1266851.jpg') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 60px;
        }

        .hero h1 { font-size: 4rem; margin: 0; }
        .status { color: #46d369; font-weight: bold; margin-bottom: 10px; }

        /* HORIZONTAL SCROLLING SECTION */
        .content-area {
            margin-left: 70px;
            padding: 20px 0 60px 60px;
            margin-top: -120px;
        }

        .row-container {
            margin-bottom: 40px;
        }

        .row-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* This enables the horizontal movement */
        .horizontal-scroll {
            display: flex;
            overflow-x: auto; /* Allows scrolling */
            gap: 15px;
            padding-right: 60px;
            scroll-behavior: smooth;
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .horizontal-scroll::-webkit-scrollbar {
            display: none;
        }

        .card {
            min-width: 300px; /* Width of each movie poster */
            height: 170px;
            background-color: #1a242f;
            border-radius: 10px;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            transition: transform 0.3s, border 0.3s;
            flex-shrink: 0; /* Prevents posters from squishing */
        }

        .card:hover {
            transform: scale(1.05);
            border: 2px solid white;
        }

        .btn-play {
            background: white;
            color: black;
            border: none;
            padding: 15px 30px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: fit-content;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-item">🔍</div>
        <div class="sidebar-item">🏠</div>
        <div class="sidebar-item">📺</div>
        <div class="sidebar-item">📦</div>
    </div>

    <nav class="navbar">
        <div class="nav-item active">Home</div>
        <div class="nav-item">Movies</div>
        <div class="nav-item">TV Shows</div>
        <div class="nav-item">Sports</div>
        <div class="nav-item">Live TV</div>
    </nav>

    <section class="hero">
        <div class="status">New Season</div>
        <h1>THE RINGS OF POWER</h1>
        <button class="btn-play">▶ Play S2 E1</button>
    </section>

    <div class="content-area">
        
        <div class="row-container">
            <div class="row-title">Prime movies</div>
            <div class="horizontal-scroll">
                <div class="card" style="background-image: url('https://placehold.co/400x225/1a242f/white?text=The+Idea+of+You')"></div>
                <div class="card" style="background-image: url('https://placehold.co/400x225/1a242f/white?text=Road+House')"></div>
                <div class="card" style="background-image: url('https://placehold.co/400x225/1a242f/white?text=My+Fault')"></div>
                <div class="card" style="background-image: url('https://placehold.co/400x225/1a242f/white?text=Jackpot')"></div>
                <div class="card" style="background-image: url('https://placehold.co/400x225/1a242f/white?text=Movie+5')"></div>
                <div class="card" style="background-image: url('https://placehold.co/400x225/1a242f/white?text=Movie+6')"></div>
            </div>
        </div>

        <div class="row-container">
            <div class="row-title">Prime Originals</div>
            <div class="horizontal-scroll">
                <div class="card" style="background-image: url('https://placehold.co/400x225/002/white?text=The+Boys')"></div>
                <div class="card" style="background-image: url('https://placehold.co/400x225/002/white?text=Fallout')"></div>
                <div class="card" style="background-image: url('https://placehold.co/400x225/002/white?text=Reacher')"></div>
                <div class="card" style="background-image: url('https://placehold.co/400x225/002/white?text=Invincible')"></div>
                <div class="card" style="background-image: url('https://placehold.co/400x225/002/white?text=Original+5')"></div>
            </div>
        </div>

    </div>

</body>
</html>
