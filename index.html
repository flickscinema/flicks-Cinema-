<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLICKS CINEMA</title>
    <style>
        :root {
            --bg-color: #0f171e;
            --text-color: #ffffff;
            --accent-color: #00a8e1;
            --sidebar-width: 80px;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* Glassmorphism Sidebar (Reference Style) */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: var(--sidebar-width);
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            z-index: 1000;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .profile-icon {
            width: 35px;
            height: 35px;
            background: linear-gradient(45deg, #ff4b2b, #ff416c);
            border-radius: 50%;
            margin-bottom: 50px;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .nav-group {
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .nav-icon {
            width: 26px;
            height: 26px;
            opacity: 0.5;
            cursor: pointer;
            transition: 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .nav-icon svg {
            fill: white;
            width: 100%;
            height: 100%;
        }

        .nav-icon:hover, .nav-icon.active {
            opacity: 1;
            transform: scale(1.1);
        }

        /* Active indicator matching the side-bar style */
        .nav-icon.active::before {
            content: '';
            position: absolute;
            left: -27px;
            width: 4px;
            height: 26px;
            background-color: white;
            border-radius: 0 4px 4px 0;
        }

        /* Main Content Layout */
        .main-container {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
        }

        /* Immersive Hero Section */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .video-background iframe {
            width: 100vw;
            height: 56.25vw; /* 16:9 Aspect Ratio */
            min-height: 100vh;
            min-width: 177.77vh; 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        /* Vignette Overlays for readability */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, 
                rgba(15, 23, 30, 1) 15%, 
                rgba(15, 23, 30, 0.6) 40%, 
                rgba(15, 23, 30, 0) 100%),
                linear-gradient(to top, 
                rgba(15, 23, 30, 1) 0%, 
                transparent 25%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            padding-left: 80px;
            max-width: 650px;
        }

        .brand-label {
            color: var(--accent-color);
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .movie-title {
            font-size: 5rem;
            margin: 0;
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: -3px;
            text-transform: uppercase;
        }

        .description {
            font-size: 1.1rem;
            color: #bdc3c7;
            line-height: 1.6;
            margin: 25px 0 35px 0;
        }

        .btn-more {
            background-color: #f3f3f3;
            color: #000;
            padding: 16px 40px;
            border: none;
            border-radius: 4px;
            font-weight: 800;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.2s ease;
        }

        .btn-more:hover {
            background-color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="profile-icon"></div>
        <div class="nav-group">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </div>
            <div class="nav-icon active">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </div>
            <div class="nav-icon">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 14H4v-4h11v4zm0-5H4V9h11v4zm5 5h-4V9h4v9z"/></svg>
            </div>
            <div class="nav-icon">
                <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
            </div>
        </div>
    </div>

    <div class="main-container">
        <section class="hero">
            <div class="video-background">
                <iframe src="https://www.youtube.com/embed/8TZMtslA3UY?autoplay=1&mute=1&controls=0&loop=1&playlist=8TZMtslA3UY&rel=0&showinfo=0&modestbranding=1" frameborder="0" allow="autoplay; encrypted-media"></iframe>
            </div>
            <div class="hero-overlay"></div>
            
            <div class="hero-content">
                <div class="brand-label">BEST CHOICE</div>
                <h1 class="movie-title">SPIDER-MAN<br>BRAND NEW DAY</h1>
                
                <p class="description">
                    After the world forgets who Peter Parker is, he must start over. 
                    Facing a dangerous new mutation and struggling to find his place, 
                    Spider-Man prepares for a rebirth that will change everything—even if it breaks his heart.
                </p>
                
                <button class="btn-more">More details</button>
            </div>
        </section>
    </div>

</body>
</html>
